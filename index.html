<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliz 1 Año y 11 Meses ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
</head>

<body>

  <!-- SOBRE -->
  <div id="envelopeContainer">
    <div class="envelope" id="envelope">
      <div class="flap"></div>
    </div>
    <button id="openBtn">Abrir 💌</button>
  </div>

  <!-- CARTA -->
  <div id="letterSection">
    <div class="paper">
      <div class="heartDecoration">❤️</div>
      <div id="text"></div>
    </div>

    <button id="writeBtn">Escribir ✍️</button>
    <button id="continueBtn">Continuar ❤️</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
